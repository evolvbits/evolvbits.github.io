<!doctype html>
<html lang="{{ contents.lang }}" data-theme="static">
  {% include head.html %}
  <body id="top">
    {% include preloader.html %}
    <main class="container legal-context py-5">
      {% include navbar.html data="default" class="navbar-legal" %}

      <div class="row mb-5 legal-context__header">
        <div class="col-lg-8">
          <h1 class="display-4 fw-bold">{{ page.title }}</h1>
          {% if page.intro %}
          <p class="lead text-muted">
            {{ page.intro }}
          </p>
          {% endif %}
        </div>
      </div>

      <div class="row g-4 legal-context__content">
        <article class="legal-context__article">
          <div class="legal-content">{{ content }}</div>
        </article>
      </div>

    </main>

    {% include footer.html class="footer-legal" theme="light" %}
    {% include scripts/global.html %}

  </body>
</html>
