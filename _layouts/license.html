---
layout: base
---

<main class="license">
  <article class="license-article">
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
    <p>{{ page.intro }}</p>
    {% endif %} {% if page.updated_at %}
    <p><strong>Last updated:</strong> {{ page.updated_at }}</p>
    {% endif %}
    <div class="license-content">{{ content }}</div>
  </article>
</main>
