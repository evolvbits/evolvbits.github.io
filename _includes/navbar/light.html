<nav class="navbar-{{ include.page }} fixed-top">
  <div class="container navbar-inner">
    <div class="nav-left">
      <a href="{{ '/' | relative_url }}" class="brand">
        <img src="{{ contents.brand.dark | relative_url }}" width="28" alt="{{ contents.title.static }}">
        <span class="brand-text">
          {{ contents.title.first }}<span class="brand-highlight">{{ contents.title.second }}</span>
        </span>
    </a>
    </div>
    {%- if contents.maintenance.enable == false -%}
    <div class="nav-right d-none d-lg-flex">
      {% assign links = contents.nav %}
      {% for item in links %}
        <a href="{{ item.href | relative_url }}"><i class="{{ item.icon }}">&nbsp;</i>{{ item.label }}</a>
      {% endfor %}
    </div>
    <div class="nav-mobile d-lg-none">
      <button class="menu-btn" data-bs-toggle="offcanvas" data-bs-target="#ebMenu">
        <i class="bi bi-list"></i>
      </button>
    </div>
    {%- endif -%}
  </div>
</nav>


<div class="offcanvas offcanvas-top eb-offcanvas d-lg-none" tabindex="-1" id="ebMenu">
  <div class="offcanvas-body">
    <ul class="mobile-list">
      {% for item in contents.nav %}
        <li><a href="{{ item.href | relative_url }}">{{ item.label }}</a></li>
      {% endfor %}
    </ul>
  </div>
</div>
