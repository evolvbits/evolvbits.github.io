---
layout: base
permalink: /
---

 <style>
      :root {
  --bg: #fff;
  --text: #03101E;
  --title: #03101E;
  --line: rgba(0, 0, 0, 0.5);
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

body {
  margin: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--text);
  font-family: "Matrixport Pro", "PingFang SC", "PingFang TC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 400;
}

.topbar {
  height: 40px;
  border-bottom: 1px solid #dadde2;
  padding: 0 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: inline-flex;
  align-items: center;
  color: var(--title);
  line-height: 0;
}

.logo svg,
.logo img {
  display: block;
  width: 58px;
  height: 33px;
  object-fit: contain;
}

.lang-switcher {
  position: relative;
  visibility: hidden;
}

.lang-trigger {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--title);
  font-size: 14px;
  font-style: normal;
  font-weight: 500;
  line-height: normal;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0;
  padding: 0;
}

.lang-label {
  margin-right: 8px;
}

.lang-caret {
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.lang-caret svg,
.lang-caret img {
  width: 24px;
  height: 24px;
  display: block;
}

.lang-menu {
  position: absolute;
  top: 44px;
  right: 0;
  min-width: 142px;
  background: #fff;
  border: 1px solid #d8dce3;
  box-shadow: 0 10px 30px rgba(17, 24, 39, 0.14);
  padding: 6px;
  margin: 0;
  list-style: none;
  z-index: 10;
}

.lang-menu button {
  width: 100%;
  border: 0;
  background: transparent;
  text-align: left;
  padding: 8px 10px;
  font-size: 15px;
  color: #0f172a;
  cursor: pointer;
}

.lang-menu button:hover,
.lang-menu button.is-active {
  background: #edf1f8;
}

.main {
  width: min(100%, 800px);
  margin: 0 auto;
  padding-top: 120px;
  padding-bottom: 160px;
  padding-left: 16px;
  padding-right: 16px;
  flex: 1;
}

.illustration {
  width: 191px;
  height: 169px;
  aspect-ratio: 165/146;
  margin: 0 auto 40px;
}

.illustration svg,
.illustration img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.title {
  margin-bottom: 40px;
}

.title img {
  display: block;
  max-width: 100%;
  width: auto;
  height: auto;
  margin: 0 auto;
  padding: 0 3.5px;
}

.content {
  max-width: 900px;
  margin: 0 auto;
  font-size: 36px;
  font-weight: 400;
  line-height: 1.65;
}

.content p {
  margin: 0;
  color: var(--text);
}

.main-text {
  font-size: 16px;
  font-style: normal;
  font-weight: 500;
  line-height: 28px;
}
.lead {
  margin-bottom: 20px;
}
.sub-text {
  font-size: 14px;
  font-style: normal;
  font-weight: 400;
  line-height: 26px;
}

.content hr {
  border: 0;
  border-top: 1px solid var(--line);
  margin: 20px 0 24px;
}

.content ul {
  margin: 0;
  padding-left: 0.5em;
}

.content li {
  margin: 0;
}

.content p.signoff {
  margin-top: 24px;
  margin-bottom: 24px;
}

.team {
  font-size: 20px;
  font-style: normal;
  font-weight: 500;
  line-height: normal;
}

html[lang="en"] .team {
  text-align: left;
}

html[lang="zh-CN"] .team,
html[lang="zh-TW"] .team {
  text-align: right;
}

footer {
  height: 80px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--text);
  font-size: 14px;
  font-style: normal;
  font-weight: 400;
  line-height: normal;
}

@media (min-width: 768px) {
  .topbar{
    padding: 0 20px;
  }
   .main {
     padding-left: 0;
     padding-right: 0;
   }
}
    </style>
