home:
  badge: "Open source tooling for modern teams"
  headline: "Build better systems with practical, high-signal developer tools."
  subheadline: "EvolvBits provides tools designed to simplify workflows, automate tasks, solve real problems, and improve productivity across different ecosystems."
  cta_primary:
    label: "Explore Projects"
    href: "/projects/"
  cta_secondary:
    label: "Contact Us"
    href: "/contact/"
  pillars:
    - title: "Fast"
      text: "Tools optimized for quick setup and immediate practical use."
      icon: "bi bi-terminal"
    - title: "Modular"
      text: "Composable building blocks that work independently or together."
      icon: "bi bi-gear-wide-connected"
    - title: "Easy to use"
      text: "Designed for low friction, clear behavior, and maintainable adoption."
      icon: "bi bi-hand-thumbs-up"
    - title: "Ecosystem compatible"
      text: "Built to integrate with varied stacks, workflows, and environments."
      icon: "bi bi-boxes"
  highlights:
    - title: "Workflow simplification"
      text: "Automating repetitive tasks and reducing operational overhead."
    - title: "Problem-oriented tooling"
      text: "Focused on solving concrete engineering bottlenecks."
    - title: "Productivity leverage"
      text: "Helping teams spend more time building and less time debugging setup."

about:
  intro: "EvolvBits builds a unified ecosystem of tools to help developers create, automate, and manage technical workflows faster and smarter."
  mission: "Provide developers with practical, lightweight, and composable software that respects developer time and solves real problems."
  philosophy:
    - "Software should solve real problems."
    - "Tools should stay lightweight and focused."
    - "Components should be composable."
    - "Developer time should always be respected."
  collaboration:
    text: "We welcome ideas, issues, and pull requests from contributors interested in improving tools and documentation."
    steps:
      - "Fork the repository"
      - "Create your feature branch"
      - "Open a pull request with context"

projects:
  featured:
