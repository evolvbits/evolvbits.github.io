        - "Automation"
        - "Developer Experience"
    - name: "EvolvBits Website"
      url: "https://github.com/evolvbits/evolvbits.github.io"
      description: "Jekyll-based website with a maintainable content structure and legal governance pages."
      tags:
        - "Jekyll"
        - "Bootstrap"
        - "Sass"
  roadmap:
    - "Starter kits for backend and DevOps workflows"
    - "Internal tooling templates for small engineering teams"
    - "Extended automation modules for CI/CD pipelines"

