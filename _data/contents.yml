home:
  badge: "Open source tooling for modern teams"
  headline: "Build better systems with practical, high-signal developer tools."
  subheadline: "EvolvBits creates lightweight utilities and workflows that help teams ship faster, automate safely, and scale with confidence."
  cta_primary:
    label: "Explore Projects"
    href: "/projects/"
  cta_secondary:
    label: "Contact Us"
    href: "/contact/"
  pillars:
    - title: "Developer-first"
      text: "We focus on clear DX, simple setup, and tools that are straightforward to adopt."
      icon: "bi bi-terminal"
    - title: "Automation with control"
      text: "Automate repetitive tasks while keeping observability, safety checks, and human approval where needed."
      icon: "bi bi-gear-wide-connected"
    - title: "Open by default"
      text: "We publish, document, and evolve projects in public whenever possible."
      icon: "bi bi-boxes"
  highlights:
    - title: "Reliable foundations"
      text: "Opinionated starters and workflows to reduce setup and operational drift."
    - title: "Pragmatic architecture"
      text: "Design decisions grounded in maintainability, performance, and team autonomy."
    - title: "Security-aware delivery"
      text: "Security considerations integrated into the normal delivery lifecycle."

about:
  mission: "Deliver practical software tools that improve engineering quality, reduce maintenance cost, and scale with real teams."
  values:
    - title: "Clarity"
      text: "Readable code, explicit tradeoffs, and documentation that helps people move quickly."
    - title: "Pragmatism"
      text: "Solutions built for production realities, not just ideal conditions."
    - title: "Rigor"
      text: "Technical choices backed by consistency, testing, and operational accountability."

projects:
  featured:
    - name: "SeedCTL"
      url: "https://github.com/evolvbits/seedctl"
      description: "CLI utility for fast project scaffolding and repeatable engineering setup."
      tags:
