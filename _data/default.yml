# Home
home:
  brand: "assets/images/evolvbits-logo-transparent-compact-dark.png"
  badge: "Open tools for everyone"
  headline: "Practical tools for people, teams, and organizations."
  subheadline: "EvolvBits provides accessible tools that simplify routines, automate tasks, solve real problems, and improve productivity across different contexts."
  cta_primary:
    label: "Explore Projects"
    href: "/#projects"
  cta_secondary:
    label: "Contact Us"
    href: "/#contact"
  pillars:
    - title: "Fast"
      text: "Tools optimized for quick setup and immediate practical use."
      icon: "bi bi-terminal"
    - title: "Modular"
      text: "Composable building blocks that work independently or together."
      icon: "bi bi-gear-wide-connected"
    - title: "Easy to use"
      text: "Designed for low friction, clear behavior, and maintainable adoption."
      icon: "bi bi-hand-thumbs-up"
    - title: "Ecosystem compatible"
      text: "Built to integrate with varied stacks, workflows, and environments."
      icon: "bi bi-boxes"
  highlights:
    - title: "Workflow simplification"
      text: "Automating repetitive tasks and reducing everyday operational effort."
    - title: "Problem-oriented tooling"
      text: "Focused on solving concrete real-world bottlenecks."
    - title: "Productivity leverage"
      text: "Helping users spend less time on setup and more time on results."

about:
  intro: "EvolvBits builds a unified ecosystem of tools for all types of users, from beginners to technical professionals."
  mission: "Provide practical, lightweight, and composable tools that respect people's time and solve real problems."
  philosophy:
    - "Software should solve real problems."
    - "Tools should stay lightweight and focused."
    - "Components should be composable."
    - "Developer time should always be respected."
  collaboration:
    text: "We welcome ideas, feedback, and contributions from anyone interested in improving tools and documentation."
    steps:
      - "Share feedback or suggestions"
      - "Report issues or improvement ideas"
      - "Contribute directly if you want to collaborate technically"

projects:
  featured:
    - name: "SeedCTL"
      url: "/seedctl/"
      description: "Cryptocurrency multichain wallet generator focused on automation and reproducible execution."
      tags:
        - "Rust"
        - "CLI"
        - "Cryptocurrency"
        - "Seed Generator"
        - "Bip39"
        - "Multichain"
  roadmap:
    - "Simple utility packs for everyday personal and professional tasks"
    - "Templates and starters for small teams and independent users"
    - "New automation modules adaptable to different kinds of workflows"

contact:
  google:
    app_web: https://script.google.com/macros/s/AKfycbxz0btyblOxIZx6KlUHKk_hyCLGuosWyc9sn8QX_tVon0ju3Zv1LnSRbsAgeWZsTqL_5w/exec
  cloudflare:
    site_key: 0x4AAAAAACpe65JjyvNY7GHJ
  title: "Talk to EvolvBits"
  text: "Use the form below to send your message. Anyone can contact us: users, creators, partners, or curious visitors."
  cta_label: "Send message"
  name:
    placeholder: "first and last name"
  email:
    placeholder: "your best email address"
    help: "we'll never share your email with anyone else."
  message:
