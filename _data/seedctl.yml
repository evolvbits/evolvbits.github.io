            href: https://github.com/evolvbits/seedctl
            external: true
          - text: GitLab Mirror
            href: https://gitlab.com/evolvbits/seedctl
            external: true
    notice_title: Usage Notice
    notices:
      - SeedCTL is non-custodial software and does not store, recover, or transmit your secrets.
      - You are fully responsible for host integrity, secure backups, and key lifecycle operations.
      - Always test recovery on a safe environment before holding funds.
    legal_links:
      - text: SeedCTL Website License
        href: /license-for-this-site/
    copyright: "© 2026 SeedCTL"
