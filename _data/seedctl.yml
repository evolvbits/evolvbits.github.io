  overview:
    eyebrow: Overview
    title: SeedCTL Documentation
    text: SeedCTL is a CLI-first, deterministic, offline-focused multichain wallet generator. It supports reproducible wallet derivation workflows with explicit entropy handling and visible derivation paths.
    logo:
      src: /assets/images/seedctl.png
      alt: SeedCTL
    badges:
      - href: https://github.com/evolvbits/seedctl/actions/workflows/release.yml
        src: https://github.com/evolvbits/seedctl/actions/workflows/release.yml/badge.svg
        alt: Build and Release (Linux & Windows)
      - href: https://github.com/evolvbits/seedctl/releases
        src: https://img.shields.io/github/v/release/seedctl/seedctl?label=latest&color=blue
        alt: Latest Release
      - href: https://github.com/evolvbits/seedctl/blob/main/LICENSE
        src: https://img.shields.io/github/license/seedctl/seedctl
        alt: License
      - src: https://img.shields.io/badge/rust-1.75%2B-orange
        alt: Rust 1.75+
      - src: https://img.shields.io/badge/works-offline-important
        alt: Works Offline
      - src: https://img.shields.io/badge/deterministic-yes-success
        alt: Deterministic
      - src: https://img.shields.io/badge/network-none-lightgrey
        alt: No Network Required

  project:
    title: Project Context
    summary: SeedCTL is a multichain, deterministic and auditable wallet generator focused on secure offline operation.
    goal: The goal is to allow verifiable wallet derivation from explicit inputs, reducing trust in opaque runtime behavior.
    mirrors:
      - text: GitHub (canonical)
        href: https://github.com/evolvbits/seedctl
        external: true
      - text: GitLab (mirror)
        href: https://gitlab.com/evolvbits/seedctl
        external: true
    status:
      - text: Build and Release workflow
        href: https://github.com/evolvbits/seedctl/actions/workflows/release.yml
        external: true
      - text: Latest releases
        href: https://github.com/evolvbits/seedctl/releases
        external: true
      - text: Issues tracker
        href: https://github.com/evolvbits/seedctl/issues
        external: true
    warning_title: Operational Warning
    warning: This software displays highly sensitive material (mnemonic, passphrase, keys). Use only in secure offline environments.
    philosophy:
      - No network dependency
      - No data transmission
      - No disk persistence by design intent
      - Compatible with offline and air-gapped workflows

  quickstart:
    title: Quick Start
    steps:
      - Download SeedCTL in [https://github.com/evolvbits/seedctl/releases](https://github.com/evolvbits/seedctl/releases){:target="_blank"}
      - Run `seedctl-[VERSION]-[SYSTEM]-x86_64` in a trusted environment.
      - Select `Create new wallet` or `Import existing wallet`.
      - Choose entropy mode and enter/select passphrase.
      - Select network and derivation options.
      - Verify outputs before funding addresses.

  flow:
    title: Execution Flow
    cards:
      - title: "1. Entropy Input"
        text: Manual dice for reproducibility or hybrid with system RNG for fresh generation.
      - title: "2. Mnemonic Stage"
        text: BIP39 12/24 words, optional passphrase, deterministic seed derivation.
      - title: "3. Path Selection"
        text: Choose chain, network, derivation style/path and address index range.
      - title: "4. Verification"
        text: Validate paths, keys and addresses against expected values before use.

  entropy:
    title: Entropy Modes
    panels:
      - title: Deterministic Mode
        points:
          - Manual dice sequence input.
          - No hidden runtime randomness.
          - Best for recovery and audit workflows.
      - title: Hybrid Mode
        points:
          - Combines dice entropy and system RNG.
          - Good for creating new wallets with defense in depth.
          - Not intended for exact deterministic replay.
    formula: |
      dice_entropy = SHA256(dice_sequence_bytes)

      deterministic: entropy_final = truncate_bits(dice_entropy, mnemonic_bits)
      hybrid:        entropy_final = truncate_bits(SHA256(dice_entropy || system_entropy_32B), mnemonic_bits)

  networks:
    title: Networks & Derivation Paths
    headers:
      - Network
      - Primary Path / Style
      - Address Format
    rows:
      - [
          Bitcoin,
          "`m/84'/coin_type'/0'` (+ BIP49/BIP44)",
          "`bc1...` / `tb1...`",
        ]
      - [Ethereum, "`m/44'/60'/0'/0/x` (+ ledger/custom)", "`0x...`"]
      - [BNB Chain, "`m/44'/60'/0'/0/x` (+ ledger/custom)", "`0x...`"]
      - [XRP Ledger, "`m/44'/144'/0'/0/x`", "`r...`"]
      - [Tron, "`m/44'/195'/0'/0/x` (+ ledger/custom)", "`T...`"]
      - [Solana, "`m/44'/501'/index'/0'`", base58]
      - [Litecoin, "`m/84'/coin_type'/0'/0/x`", "`ltc...` / `tltc...`"]
      - [Polygon, "`m/44'/60'/0'/0/x` (+ ledger/custom)", "`0x...`"]
      - [Cardano, "`m/1852'/1815'/0'/0/index`", "`addr...` / `addr_test...`"]
      - [Monero, "`xmr(major=0,minor=index)` model", base58]

  compatibility:
    title: Wallet Compatibility
    groups:
      - network: Bitcoin
        wallets:
          - Sparrow Wallet
          - Electrum
          - BlueWallet
          - Bitcoin Core
      - network: Ethereum
        wallets:
          - MetaMask
          - Ledger Live
          - Other BIP39/BIP44 wallets with `m/44'/60'/0'/0/x`
      - network: BNB Smart Chain
        wallets:
          - MetaMask (BSC network)
          - Trust Wallet
          - Rabby
          - Other EVM wallets with `m/44'/60'/0'/0/x`
      - network: XRP Ledger
        wallets:
          - Xaman (XUMM)
          - Ledger Live
          - Other XRPL wallets with `m/44'/144'/0'/0/x`
      - network: Tron
        wallets:
          - TronLink
          - Wallets using `m/44'/195'/0'/0/x`
      - network: Solana
        wallets:
          - Phantom
          - Solana CLI / `solana-keygen`
          - Wallets using `m/44'/501'/index'/0'`
      - network: Cardano
        wallets:
          - Eternl
          - Yoroi
          - Lace
          - Wallets using CIP-1852 `m/1852'/1815'/account'/0/index`
      - network: Monero
        wallets:
          - Monero GUI Wallet
          - "`monero-wallet-cli`"
          - Feather Wallet
          - Wallets compatible with standard/subaddress format

  outputs:
    title: Generated Outputs
    items:
      - BIP39 mnemonic and word indexes.
      - Account-level key material (as applicable by chain).
      - Derivation paths used for each generated address.
      - Address lists by selected index range.
      - Optional watch-only export files.

  security:
    title: Security Policy
    version_note: Only the latest version of SeedCTL is supported.
    reporting:
      title: Reporting a Vulnerability
      items:
        - Do NOT open a public issue.
        - Contact the maintainer privately via GitHub or GitLab.
        - "Provide: issue description, impact analysis, and reproduction steps if possible."
    assumptions:
      assumes:
        title: This project assumes
        points:
          - Offline usage
          - Trusted execution environment
          - No OS-level compromise
          - No malicious hardware or firmware
      not_mitigated:
        title: Does not mitigate
        points:
          - Malware and keyloggers
          - Screen recording
          - Side-channel attacks
    responsibility:
      title: User Responsibility
      points:
        - Environment security and host integrity.
        - Key storage and backup strategy.
        - Understanding derivation paths for all supported networks.
        - Use at your own risk.
    panels:
      - title: What SeedCTL Helps With
        points:
          - Transparent derivation and generation flow.
          - Deterministic reproducibility controls.
          - Reduced dependence on opaque tools/services.
      - title: What You Must Handle
        points:
          - Host OS security and malware hygiene.
          - Safe key/mnemonic storage and backups.
          - Correct network/path/passphrase validation.

  recovery:
    title: Deterministic Recovery Checklist
    steps:
      - Use same mnemonic source and size.
      - Use same entropy mode and dice sequence (if used).
      - Use exact same passphrase.
      - Use same chain/network and derivation style/path.
      - Compare paths, keys and addresses for the same indices.

  reproducibility:
    title: Reproducibility & Deterministic Recovery
    intro: "This section explains how to deterministically reproduce wallets generated with SeedCTL. A wallet is reproducible only when all relevant inputs are identical — if any input changes, outputs change."
    networks:
      - Bitcoin (BTC)
      - Ethereum (ETH)
      - BNB Smart Chain (BNB)
      - XRP Ledger (XRP)
      - Tron (TRX)
      - Solana (SOL)
      - Litecoin (LTC)
      - Polygon (POL/MATIC)
      - Cardano (ADA)
      - Monero (XMR)

  terms:
    title: Terms of Use
    updated_at: "February 26, 2026"
    intro: These terms describe the operational responsibilities and risk assumptions accepted when you use SeedCTL.
    sections:
      - title: "1. Scope"
        points:
          - SeedCTL is provided as a technical tool for deterministic wallet generation and verification workflows.
          - The software does not custody assets, execute transactions, or provide investment advice.
      - title: "2. User Responsibilities"
        points:
          - Use the software only in trusted environments under your control.
          - Protect mnemonic phrases, passphrases, private keys, and exported files at all times.
          - Validate derivation paths, network selection, and addresses before funding any wallet.
      - title: "3. Security Care"
        points:
          - Keep host OS, firmware, and security controls hardened and updated.
          - Prefer offline or air-gapped procedures for high-value key generation.
          - Maintain tested backup and disaster-recovery procedures.
      - title: "4. Risk Disclosure"
        points:
          - Any compromise of your host, inputs, storage, or operational process can cause irreversible asset loss.
          - Blockchain transfers are irreversible; wrong addresses or wrong networks may not be recoverable.
          - Deterministic reproduction depends on exact matching inputs, passphrase, path, and network.
      - title: "5. No Warranty"
        points:
          - SeedCTL is provided "as is", without warranties of availability, fitness, or non-infringement.
          - You assume all risks resulting from software use, misuse, or environment failures.
      - title: "6. Acceptance"
        points:
          - By using SeedCTL, you agree to these terms and confirm you understand the operational risks.

  disclaimer:
    title: Disclaimer
    sections:
      - title: Security and Liability Notice
        text: This software handles highly sensitive material and may irreversibly expose mnemonic phrases (BIP39 seeds), passphrases, private keys, and wallet metadata. If any of the above is exposed, funds can be permanently lost.
      - title: User Responsibility
        intro: "By using this software, you accept full responsibility for:"
        points:
          - where and how this software is executed
          - seed/key generation, storage, backup, and recovery procedures
          - validation of derivation paths, address formats, and network selection
          - testing and verification before moving significant funds
      - title: Operational Security Requirements (Recommended)
        points:
          - run offline / air-gapped whenever possible
          - use a clean and trusted operating environment
          - avoid shared computers, remote sessions, and screen recording
          - verify binaries, checksums, and signatures before execution
          - never store sensitive secrets in plaintext or cloud-synced folders
      - title: No Warranty
        text: 'This software is provided "AS IS", without warranties of any kind, express or implied, including but not limited to merchantability, fitness for a particular purpose, and non-infringement.'
      - title: Limitation of Liability
        text: "The author(s), maintainer(s), and contributor(s) shall not be liable for any direct or indirect loss, including loss of funds, data loss, operational loss, or security incidents resulting from use or misuse of this software."
      - title: Acceptance of Risk
        text: By using this software, you acknowledge that you understand these risks and accept full responsibility for all outcomes.

  site_footer:
    brand_title: SeedCTL
    description: Deterministic multichain wallet generation for security-focused operators.
    columns:
      - title: Project
        links:
