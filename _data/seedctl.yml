features:
  id: features
  eyebrow: WHY SEEDCTL
  title: Built for paranoid-by-default operations
  items:
    - title: Deterministic by design
      text: Manual entropy mode reproduces identical outputs from identical inputs.
    - title: Hybrid entropy option
      text: Combine dice entropy with system RNG for defense in depth on fresh generation.
    - title: Path transparency
      text: Derivation mode/style/path are explicit, making cross-wallet verification practical.
    - title: Air-gap friendly
      text: Core workflow does not require network connectivity to generate keys and addresses.

how_it_works:
  eyebrow: HOW IT WORKS
  title: From entropy input to reproducible wallet outputs
  items:
    - step: "01"
      title: Entropy Input
      text: Choose deterministic manual dice input or hybrid mode with system RNG.
      icon: entropy
    - step: "02"
      title: Mnemonic & Passphrase
      text: Generate/import BIP39 mnemonic and apply optional passphrase.
      icon: mnemonic
    - step: "03"
      title: Derivation Selection
      text: Select network, derivation style/path and address index range.
      icon: derivation
    - step: "04"
      title: Verification
      text: Compare outputs, paths and addresses for independent reproducibility checks.
      icon: check

entropy_modes:
  eyebrow: ENTROPY MODES
  title: Deterministic vs Hybrid mode
  items:
    - title: Deterministic Mode
      tag: reproducibility-first
      icon: triangle
      points:
        - Manual dice sequence (1-6)
        - No hidden runtime randomness
        - Best for recovery and audit
    - title: Hybrid Mode
      tag: fresh-generation-first
      icon: circle
      points:
        - Dice entropy + system RNG
        - Defense in depth for new wallets
        - Not intended for deterministic replay

threat_model:
  eyebrow: THREAT MODEL
  title: What SeedCTL mitigates and what it does not
  cards:
    - title: Mitigates
      icon: shield
      points:
        - Opaque key generation process
        - Single-source entropy dependence
        - Derivation path ambiguity
        - Lack of reproducibility checkpoints
    - title: Does Not Mitigate
      icon: warning
      points:
        - Compromised OS or malware
        - Keyloggers and screen capture
        - Malicious firmware/hardware
        - Unsafe operational practices

security_intro:
  id: security
  eyebrow: SECURITY
  title: Security is a process, not a toggle.

security_panels:
  - eyebrow: OPERATIONAL SNAPSHOT
    title: Deterministic process with visible checkpoints
    points:
      - Entropy flow is explicit in manual and hybrid modes.
      - Derivation style and path remain visible during generation.
      - Same inputs produce the same output for verification.
      - Structured for audit and cold-storage workflows.
  - eyebrow: SECURITY MODEL
    title: What SeedCTL guarantees, and what remains your responsibility
    points:
      - Core generation can run without network dependency.
      - Deterministic mode avoids hidden runtime randomness.
      - You must protect the execution environment and secret storage.
      - You must verify network, path, and passphrase before funding addresses.
    cta:
      text: Open Security Guide
      href: /seedctl/documentation/#security
      class: btn btn-primary

